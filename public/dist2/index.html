<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>项目 2</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;

      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;

      margin-bottom: 1rem;

      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.3s ease;

    .back-link:hover {
      transform: scale(1.05);
    }
  </style>
</head>
